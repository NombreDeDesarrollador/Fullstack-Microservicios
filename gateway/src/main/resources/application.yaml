server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      mvc:
        routes:

          - id: notas
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/notas/**

          - id: ponderaciones
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/ponderaciones/**

          - id: asignaturas
            uri: http://localhost:8084
            predicates:
              - Path=/api/v1/asignaturas/**

          - id: unidades
            uri: http://localhost:8084
            predicates:
              - Path=/api/v1/unidades/**

          - id: profesores
            uri: http://localhost:8085
            predicates:
              - Path=/api/v1/profesores/**

          - id: grupos
            uri: http://localhost:8086
            predicates:
              - Path=/api/v1/grupos/**

          - id: integrantes
            uri: http://localhost:8087
            predicates:
              - Path=/api/v1/integrantes/**

          - id: roles
            uri: http://localhost:8088
            predicates:
              - Path=/api/v1/roles/**

          - id: secciones
            uri: http://localhost:8089
            predicates:
              - Path=/api/v1/secciones/**

          - id: trabajos
            uri: http://localhost:8090
            predicates:
              - Path=/api/v1/trabajos/**