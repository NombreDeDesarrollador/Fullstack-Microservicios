server:
  port: 8095

spring:
  application:
    name: gateway

  cloud:
    gateway:
      mvc:
        routes:

          - id: notas
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/notas/**

          - id: ponderaciones
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/ponderaciones/**

          - id: asignaturas
            uri: http://localhost:8084
            predicates:
              - Path=/api/v1/asignaturas/**

          - id: unidades
            uri: http://localhost:8084
            predicates:
              - Path=/api/v1/unidades/**

          - id: profesores
            uri: http://localhost:8085
            predicates:
              - Path=/api/v1/profesores/**

          - id: grupos
            uri: http://localhost:8086
            predicates:
              - Path=/api/v1/grupos/**

          - id: integrantes
            uri: http://localhost:8087
            predicates:
              - Path=/api/v1/integrantes/**

          - id: roles
            uri: http://localhost:8088
            predicates:
              - Path=/api/v1/roles/**

          - id: secciones
            uri: http://localhost:8089
            predicates:
              - Path=/api/v1/secciones/**

          - id: trabajos
            uri: http://localhost:8090
            predicates:
              - Path=/api/v1/trabajos/**

          - id: entregas
            uri: http://localhost:8091
            predicates:
              - Path=/api/v1/entregas/**

          - id: comentarios
            uri: http://localhost:8092
            predicates:
              - Path=/api/v1/comentarios/**

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: notas
        url: /api/v1/notas/v3/api-docs/notas
        
      - name: ponderaciones
        url: /api/v1/notas/v3/api-docs/ponderaciones
      
      - name: asignaturas
        url: /api/v1/asignaturas/v3/api-docs/asignaturas

      - name: unidades
        url: /api/v1/asignaturas/v3/api-docs/unidades

      - name: profesores
        url: /api/v1/profesores/v3/api-docs

      - name: grupos
        url: /api/v1/grupos/v3/api-docs

      - name: integrantes
        url: /api/v1/integrantes/v3/api-docs

      - name: roles
        url: /api/v1/roles/v3/api-docs

      - name: secciones
        url: /api/v1/secciones/v3/api-docs

      - name: trabajos
        url: /api/v1/trabajos/v3/api-docs

      - name: entregas
        url: /api/v1/entregas/v3/api-docs

      - name: comentarios
        url: /api/v1/comentarios/v3/api-docs