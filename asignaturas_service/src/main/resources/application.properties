spring.application.name=asignaturas_service
server.port=8084


#spring.datasource.url=jdbc:mysql://localhost:3306/microservicios_asignaturas?createDatabaseIfNotExist=true
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/microservicios_asignaturas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

eureka.client.eureka-server-http-client-name=RestClient

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

management.endpoints.web.exposure.include=health,info

management.info.env.enabled=true

springdoc.api-docs.path=/api/v1/asignaturas/v3/api-docs

server.forward-headers-strategy=framework

springdoc.group-configs[0].group=asignaturas
springdoc.group-configs[0].paths-to-match=/api/v1/asignaturas/**

springdoc.group-configs[1].group=unidades
springdoc.group-configs[1].paths-to-match=/api/v1/unidades/**